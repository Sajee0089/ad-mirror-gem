<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ads SL</title>
    <script>
      // SPA redirect for GitHub Pages (BrowserRouter support)
      // Encodes the path into a query parameter so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname + l.search + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
