  <body>
    <script>
      // SPA redirect handler for GitHub Pages
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null, decodeURIComponent(q.p) || '/');
          }
        }
      }(window.location));
    </script>
